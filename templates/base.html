{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS do Projeto -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary p-2" data-bs-theme="light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">PycodeBR</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'cars_list' %}">Carros</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'new_car' %}">Cadastrar Carro</a>
            </li>
          </ul>
          <form class="d-flex" role="search" method="GET" action="{% url 'cars_list' %}">
            <input class="form-control me-2" type="search" placeholder="Buscar carro ..." aria-label="Buscar carro">
            <button class="btn btn-outline-light" type="submit">Buscar</button>
          </form>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-container-base">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="footer-fixed">
    <div class="conteudo-footer">
      <p>&copy; 2023 PycodeBR Multimarcas</p>
    </div>
  </footer>
</body>
</html>
